join:
  enabled: true
  sources:
  - key: user_id
    orientation: left
    source_id: user_logins
    time_window: 1h
  - key: user_id
    orientation: right
    source_id: orders
    time_window: 1h
  type: temporal
name: Test Pipeline
pipeline_id: test-pipeline
filter:
  enabled: true
  expression: user_id = '123'
stateless_transformation:
  enabled: true
  id: my_transformation
  type: expr_lang_transform
  config:
    transform:
      - expression: upper(user_id)
        output_name: upper_user_id
        output_type: string
sink:
  type: clickhouse
  connection_params:
    host: <host>
    port: "12753"
    http_port: "12754"
    database: default
    username: <user>
    password: <password>
    secure: true
  table: user_orders
  max_batch_size: 1
  max_delay_time: 10m
  source_id: my_transformation
  mapping:
  - name: session_id
    column_name: session_id
    column_type: String
  - name: user_id
    column_name: user_id
    column_type: String
  - name: order_id
    column_name: order_id
    column_type: String
  - name: timestamp
    column_name: order_placed_at
    column_type: DateTime
  - name: timestamp
    column_name: login_at
    column_type: DateTime
  - name: upper_user_id
    column_name: upper_user_id
    column_type: String
source:
  connection_params:
    brokers:
    - kafka-broker-0:9092
    - kafka-broker-1:9092
    mechanism: SCRAM-SHA-256
    password: <password>
    protocol: SASL_SSL
    root_ca: <base64 encoded ca>
    skip_auth: false
    username: <user>
  provider: aiven
  topics:
  - consumer_group_initial_offset: earliest
    deduplication:
      enabled: true
      key: session_id
      time_window: 12h
    name: user_logins
    schema_fields:
    - name: session_id
      type: string
    - name: user_id
      type: string
    - name: timestamp
      type: string
  - consumer_group_initial_offset: earliest
    deduplication:
      enabled: true
      key: order_id
      time_window: 12h
    name: orders
    schema_fields:
    - name: order_id
      type: string
    - name: user_id
      type: string
    - name: timestamp
      type: string
    - name: skip_sink_field
      type: string
  type: kafka
