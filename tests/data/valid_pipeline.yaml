version: v3
pipeline_id: test-pipeline
name: Test Pipeline
sources:
- type: kafka
  source_id: user-logins
  connection_params:
    brokers:
    - kafka-broker-0:9092
    - kafka-broker-1:9092
    mechanism: SCRAM-SHA-256
    password: <password>
    protocol: SASL_SSL
    root_ca: <base64 encoded ca>
    username: <user>
  topic: user_logins
  consumer_group_initial_offset: earliest
  schema_fields:
  - name: session_id
    type: string
  - name: user_id
    type: string
  - name: timestamp
    type: string
- type: kafka
  source_id: orders
  connection_params:
    brokers:
    - kafka-broker-0:9092
    - kafka-broker-1:9092
    mechanism: SCRAM-SHA-256
    password: <password>
    protocol: SASL_SSL
    root_ca: <base64 encoded ca>
    username: <user>
  topic: orders
  consumer_group_initial_offset: earliest
  schema_fields:
  - name: order_id
    type: string
  - name: user_id
    type: string
  - name: timestamp
    type: string
  - name: skip_sink_field
    type: string
transforms:
- type: dedup
  source_id: user-logins
  config:
    key: session_id
    time_window: 12h
- type: dedup
  source_id: orders
  config:
    key: order_id
    time_window: 12h
- type: filter
  source_id: user-logins
  config:
    expression: user_id = '123'
- type: stateless
  source_id: user-logins
  config:
    transforms:
    - expression: upper(user_id)
      output_name: upper_user_id
      output_type: string
join:
  enabled: true
  type: temporal
  left_source:
    source_id: user-logins
    key: user_id
    time_window: 1h
  right_source:
    source_id: orders
    key: user_id
    time_window: 1h
  output_fields:
  - source_id: user-logins
    name: session_id
  - source_id: orders
    name: order_id
sink:
  type: clickhouse
  connection_params:
    host: <host>
    port: "12753"
    http_port: "12754"
    database: default
    username: <user>
    password: <password>
    secure: true
  table: user_orders
  max_batch_size: 1
  max_delay_time: 10m
  mapping:
  - name: session_id
    column_name: session_id
    column_type: String
  - name: user_id
    column_name: user_id
    column_type: String
  - name: order_id
    column_name: order_id
    column_type: String
  - name: timestamp
    column_name: order_placed_at
    column_type: DateTime
  - name: timestamp
    column_name: login_at
    column_type: DateTime
  - name: upper_user_id
    column_name: upper_user_id
    column_type: String
